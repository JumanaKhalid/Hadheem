<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق هضيم - غذاؤك دواؤك</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Cairo:wght@600;700;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .font-almarai { font-family: 'Almarai', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        @media print { .no-print { display: none !important; } }
        video { transform: scaleX(-1); object-fit: cover; } 
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Mobile-safe filters using backdrop */
        .filter-overlay { transition: all 1s ease-in-out; }
        .filter-healthy { background: rgba(16, 185, 129, 0.15); backdrop-filter: saturate(150%) contrast(110%); -webkit-backdrop-filter: saturate(150%) contrast(110%); }
        .filter-unhealthy { background: rgba(0, 0, 0, 0.4); backdrop-filter: grayscale(80%) sepia(30%); -webkit-backdrop-filter: grayscale(80%) sepia(30%); mix-blend-mode: multiply; }
        .filter-danger { background: rgba(220, 38, 38, 0.2); backdrop-filter: grayscale(50%) contrast(120%); -webkit-backdrop-filter: grayscale(50%) contrast(120%); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom SVGs for specific foods
        const FoodIcons = {
            cheese: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15.2 3.8L5.6 9.3c-1.3.8-1.5 2.5-.5 3.5l8.7 8.7c.9 1 2.7.9 3.5-.5l5.5-9.6c.7-1.3-.2-3-1.6-3h-4.8L15.2 3.8z" /><circle cx="15.5" cy="11.5" r="1.5" /><circle cx="11.5" cy="15.5" r="1.5" /></svg>,
            fastfood: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 11h18M3 15h18M5 11v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8M8 7l4-4 4 4" /></svg>
        };

        const LucideIcon = ({ name, className }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // MOH Categories: Hydration, Fiber (Veg/Fruit), Protein, Carbs, Harmful
        const FOOD_ITEMS = [
            { id: 1, name: 'ماء', icon: 'droplets', category: 'hydration', type: 'healthy', color: 'text-cyan-500', bg: 'bg-cyan-50' },
            { id: 2, name: 'خضروات', icon: 'salad', category: 'fiber', type: 'healthy', color: 'text-emerald-600', bg: 'bg-emerald-50' },
            { id: 3, name: 'فواكه', icon: 'apple', category: 'fiber', type: 'healthy', color: 'text-red-500', bg: 'bg-red-50' },
            { id: 4, name: 'أسماك', icon: 'fish', category: 'protein', type: 'healthy', color: 'text-blue-600', bg: 'bg-blue-50' },
            { id: 5, name: 'دجاج', icon: 'drumstick', category: 'protein', type: 'healthy', color: 'text-orange-500', bg: 'bg-orange-50' },
            { id: 6, name: 'لحوم حمراء', icon: 'beef', category: 'protein', type: 'neutral', color: 'text-rose-800', bg: 'bg-rose-50' },
            { id: 7, name: 'حبوب كاملة', icon: 'wheat', category: 'carbs', type: 'healthy', color: 'text-amber-700', bg: 'bg-amber-50' },
            { id: 8, name: 'حليب وأجبان', icon: 'milk', category: 'dairy', type: 'healthy', color: 'text-blue-400', bg: 'bg-blue-50' },
            { id: 9, name: 'وجبات سريعة', icon: 'fastfood', category: 'harmful', type: 'unhealthy', color: 'text-orange-600', bg: 'bg-orange-50' },
            { id: 10, name: 'مقليات', icon: 'pizza', category: 'harmful', type: 'unhealthy', color: 'text-red-600', bg: 'bg-red-50' },
            { id: 11, name: 'مشروبات غازية', icon: 'cup-soda', category: 'harmful', type: 'unhealthy', color: 'text-slate-700', bg: 'bg-slate-100' },
            { id: 12, name: 'حلويات', icon: 'candy', category: 'harmful', type: 'unhealthy', color: 'text-pink-500', bg: 'bg-pink-50' },
        ];

        function App() {
            const [screen, setScreen] = useState('home');
            const [basket, setBasket] = useState([]);
            const [timePeriod, setTimePeriod] = useState(1);
            const [showResult, setShowResult] = useState(false);
            const [report, setReport] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [showModal, setShowModal] = useState(false);
            const videoRef = useRef(null);
            const streamRef = useRef(null);

            useEffect(() => {
                if (screen === 'ar') {
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                        .then(stream => { 
                            streamRef.current = stream;
                            if (videoRef.current) videoRef.current.srcObject = stream; 
                        })
                        .catch(err => console.error("Camera error:", err));
                }
                return () => {
                    if (streamRef.current) streamRef.current.getTracks().forEach(track => track.stop());
                };
            }, [screen]);

            const toggleFood = (food) => {
                setShowResult(false);
                setBasket(prev => prev.find(i => i.id === food.id) ? prev.filter(i => i.id !== food.id) : [...prev, food]);
            };

            // Mobile-Safe visual indicator
            const getOverlayClass = () => {
                if (!showResult || basket.length === 0) return '';
                let score = calculateMOHScore();
                if (score >= 70) return 'filter-healthy';
                if (score < 40) return 'filter-danger';
                return 'filter-unhealthy';
            };

            const calculateMOHScore = () => {
                let score = 50; // Base score
                const categories = basket.map(i => i.category);
                const hasHarmful = basket.some(i => i.category === 'harmful');

                if (basket.length === 0) return 0;

                // MOH Logic: Balance is key
                if (categories.includes('hydration')) score += 15; else score -= 15; // Water is crucial
                if (categories.includes('fiber')) score += 15; else score -= 10;
                if (categories.includes('protein')) score += 10;
                if (categories.includes('carbs')) score += 5;
                
                // Penalties for harmful food
                basket.forEach(i => {
                    if (i.category === 'harmful') score -= 15;
                    if (i.name === 'لحوم حمراء' && !categories.includes('fiber')) score -= 5; // Meat without fiber is heavy
                });

                if (timePeriod === 3 && score < 50) score -= 10;
                if (timePeriod === 3 && score >= 70) score += 5;

                return Math.max(0, Math.min(100, Math.round(score)));
            };

            const generateInfographicReport = async () => {
                setShowModal(true);
                setIsAnalyzing(true);
                setReport(null);
                
                await new Promise(resolve => setTimeout(resolve, 1500)); // Simulating processing
                
                const score = calculateMOHScore();
                const duration = timePeriod === 1 ? 'شهر' : timePeriod + ' أشهر';
                
                // Organ Impact Logic based on MOH Guidelines
                const organs = {
                    brain: { status: 'neutral', text: 'يعمل بشكل طبيعي.' },
                    heart: { status: 'neutral', text: 'معدل النبض وضغط الدم في المعدل الطبيعي.' },
                    stomach: { status: 'neutral', text: 'عملية الهضم تسير بشكل معتاد.' },
                    bones: { status: 'neutral', text: 'كثافة العظام مستقرة.' }
                };

                const names = basket.map(i => i.name);

                // Brain Impact
                if (names.includes('أسماك') || names.includes('ماء')) {
                    organs.brain = { status: 'good', text: 'نشاط ذهني عالي وتركيز ممتاز بفضل أوميغا-3 والترطيب الجيد.' };
                } else if (names.includes('حلويات') || names.includes('مشروبات غازية')) {
                    organs.brain = { status: 'bad', text: 'السكريات العالية تسبب تقلبات في المزاج وتشتت في التركيز (ضبابية الدماغ).' };
                }

                // Heart Impact
                if (names.includes('وجبات سريعة') || names.includes('مقليات')) {
                    organs.heart = { status: 'bad', text: 'الدهون المتحولة ترفع الكوليسترول الضار (LDL) وتزيد العبء على عضلة القلب.' };
                } else if (names.includes('خضروات') && (names.includes('دجاج') || names.includes('أسماك'))) {
                    organs.heart = { status: 'good', text: 'صحة قلبية ممتازة، تدفق دم نقي بفضل الألياف والبروتين الخالي من الدهون.' };
                }

                // Digestion Impact
                if (!names.includes('ماء') || (!names.includes('خضروات') && !names.includes('فواكه'))) {
                    organs.stomach = { status: 'bad', text: 'نقص الألياف والماء يؤدي إلى عسر الهضم، الإمساك، وبطء معدل الحرق (الأيض).' };
                } else if (names.includes('خضروات') || names.includes('حبوب كاملة')) {
                    organs.stomach = { status: 'good', text: 'بيئة معوية صحية (ميكروبيوم) وهضم سلس بفضل الألياف الطبيعية.' };
                }

                // Bones Impact
                if (names.includes('مشروبات غازية')) {
                    organs.bones = { status: 'bad', text: 'أحماض الفوسفوريك في الغازيات تعيق امتصاص الكالسيوم وتهدد بهشاشة العظام.' };
                } else if (names.includes('حليب وأجبان')) {
                    organs.bones = { status: 'good', text: 'بناء عظمي قوي ومدعم بالكالسيوم وفيتامين د الأساسي.' };
                }

                let summary = "";
                if (score >= 75) summary = "الطبق الصحي المعتمد: النمط المختار يطابق توصيات وزارة الصحة للوقاية من الأمراض المزمنة وبناء مناعة قوية.";
                else if (score >= 45) summary = "نمط غير متوازن: يحتاج لإضافة مصادر طبيعية (ألياف/ماء) وتقليل الأطعمة المصنعة لتجنب الإرهاق.";
                else summary = "نمط عالي الخطورة: يتعارض مع المعايير الصحية، ويشكل استمراره خطراً مسبباً للسمنة والسكري ومشاكل القلب.";

                setReport({ score, duration, organs, summary });
                setIsAnalyzing(false);
            };

            const OrganCard = ({ title, icon, data }) => {
                const colors = {
                    good: 'bg-emerald-50 border-emerald-200 text-emerald-800',
                    bad: 'bg-rose-50 border-rose-200 text-rose-800',
                    neutral: 'bg-slate-50 border-slate-200 text-slate-700'
                };
                const iconColors = {
                    good: 'text-emerald-500', bad: 'text-rose-500', neutral: 'text-slate-400'
                };
                
                return (
                    <div className={`p-4 md:p-6 rounded-3xl border-2 flex items-start gap-4 transition-all ${colors[data.status]}`}>
                        <div className={`p-3 bg-white rounded-2xl shadow-sm ${iconColors[data.status]}`}>
                            <LucideIcon name={icon} className="w-8 h-8" />
                        </div>
                        <div>
                            <h4 className="font-black text-xl mb-1">{title}</h4>
                            <p className="font-almarai text-sm md:text-base leading-relaxed">{data.text}</p>
                        </div>
                    </div>
                );
            };

            if (screen === 'home') {
                return (
                    <div className="min-h-screen bg-emerald-50 flex flex-col items-center justify-center p-6 text-center">
                        <div className="bg-white p-12 rounded-[4rem] shadow-2xl max-w-lg w-full border-b-[16px] border-emerald-500">
                            <div className="bg-emerald-500 w-32 h-32 rounded-full flex items-center justify-center mx-auto mb-10 text-white shadow-xl relative overflow-hidden">
                                <LucideIcon name="activity" className="w-16 h-16 animate-pulse z-10" />
                                <div className="absolute inset-0 bg-emerald-400 animate-ping opacity-20"></div>
                            </div>
                            <h1 className="text-8xl font-black text-slate-800 mb-4 tracking-tighter">هضيم</h1>
                            <p className="text-3xl text-emerald-600 font-bold mb-10 leading-relaxed font-almarai">غذاؤك إما داؤك وإما دواؤك</p>
                            <button onClick={() => setScreen('ar')} className="w-full bg-slate-900 hover:bg-emerald-600 text-white font-black py-6 px-10 rounded-[2.5rem] flex items-center justify-center gap-4 transition-all text-2xl shadow-2xl">
                                ابدأ التجربة <LucideIcon name="arrow-right" className="w-8 h-8" />
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col lg:flex-row">
                    {/* Camera Section */}
                    <div className="flex-1 relative bg-black h-[40vh] lg:h-screen overflow-hidden">
                        <video ref={videoRef} autoPlay playsInline muted className="absolute inset-0 w-full h-full" />
                        
                        {/* Mobile Safe Filter Overlay */}
                        <div className={`absolute inset-0 pointer-events-none filter-overlay ${getOverlayClass()}`}></div>
                        
                        <div className="absolute top-6 left-6 right-6 flex justify-between items-start z-10 no-print">
                            <div className="bg-white/20 backdrop-blur-xl text-white px-6 py-3 rounded-full border border-white/30 flex items-center gap-3 shadow-lg">
                                <div className={`w-3 h-3 rounded-full animate-pulse ${showResult ? (calculateMOHScore() > 50 ? 'bg-emerald-400' : 'bg-rose-400') : 'bg-white'}`}></div>
                                <h2 className="font-black text-lg">عدسة هضيم التغذوية</h2>
                            </div>
                            <button onClick={() => setScreen('home')} className="bg-white/20 hover:bg-red-500 p-4 rounded-full text-white backdrop-blur-md transition-all shadow-lg">
                                <LucideIcon name="power" className="w-6 h-6" />
                            </button>
                        </div>
                        
                        {showResult && (
                            <div className="absolute bottom-10 left-0 right-0 flex justify-center px-6 z-10 no-print animate-fade-in">
                                <button onClick={generateInfographicReport} className="w-full max-w-md bg-emerald-500 hover:bg-emerald-600 text-white font-black py-6 px-8 rounded-[3rem] shadow-2xl flex items-center justify-center gap-4 transition-all border-4 border-white/20 hover:scale-105 active:scale-95">
                                    <LucideIcon name="brain" className="w-8 h-8" /> 
                                    <span className="text-2xl">تحليل هضيم AI</span>
                                </button>
                            </div>
                        )}
                    </div>

                    {/* Controls Section */}
                    <div className="w-full lg:w-[500px] flex flex-col h-[60vh] lg:h-screen bg-white shadow-2xl z-30 no-print">
                        <div className="p-8 bg-emerald-600 text-white rounded-bl-[3rem]">
                            <h2 className="text-3xl font-black flex items-center gap-3"><LucideIcon name="utensils" className="w-8 h-8" /> سلة الغذاء</h2>
                            <p className="text-emerald-100 mt-2 font-almarai text-sm">اختر الأطعمة لنرى تأثيرها على جسمك</p>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-8 space-y-10 custom-scrollbar">
                            <section>
                                <h3 className="text-xl font-black text-slate-800 mb-4 flex items-center gap-2">مدة الالتزام بالنمط؟</h3>
                                <div className="grid grid-cols-3 gap-3">
                                    {[1, 2, 3].map(m => (
                                        <button key={m} onClick={() => { setTimePeriod(m); setShowResult(false); }} className={`py-3 rounded-2xl font-black text-lg border-2 transition-all ${timePeriod === m ? 'bg-emerald-500 border-emerald-500 text-white' : 'bg-slate-50 border-slate-200 text-slate-500'}`}>
                                            {m === 1 ? 'شهر' : m + ' أشهر'}
                                        </button>
                                    ))}
                                </div>
                            </section>
                            
                            <section>
                                <h3 className="text-xl font-black text-slate-800 mb-4">محتويات السلة</h3>
                                <div className="grid grid-cols-3 gap-3">
                                    {FOOD_ITEMS.map(food => {
                                        const isSelected = basket.find(item => item.id === food.id);
                                        return (
                                            <button key={food.id} onClick={() => toggleFood(food)} className={`flex flex-col items-center justify-center p-4 rounded-[2rem] border-2 transition-all h-32 ${isSelected ? 'border-emerald-500 bg-emerald-50 shadow-md' : 'border-slate-100 bg-slate-50 hover:bg-slate-100'}`}>
                                                <div className={`p-3 rounded-2xl mb-2 ${isSelected ? 'bg-white shadow-sm' : food.bg}`}>
                                                    {food.icon === 'cheese' ? <FoodIcons.cheese /> : 
                                                     food.icon === 'fastfood' ? <FoodIcons.fastfood /> :
                                                     <LucideIcon name={food.icon} className={`w-7 h-7 ${food.color}`} />}
                                                </div>
                                                <span className="text-sm font-bold text-slate-700 font-almarai text-center leading-tight">{food.name}</span>
                                            </button>
                                        );
                                    })}
                                </div>
                            </section>
                        </div>
                        
                        <div className="p-6 border-t bg-slate-50">
                            <button onClick={() => setShowResult(true)} disabled={basket.length === 0} className={`w-full py-5 rounded-[2rem] font-black text-xl flex items-center justify-center gap-3 transition-all ${basket.length > 0 ? 'bg-slate-900 hover:bg-slate-800 text-white shadow-lg' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                                تطبيق الفلتر <LucideIcon name="sparkles" className="w-6 h-6" />
                            </button>
                        </div>
                    </div>

                    {/* Infographic Modal */}
                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[100] flex justify-center items-center p-4 md:p-8 overflow-y-auto">
                            <div className="bg-white rounded-[3rem] w-full max-w-4xl shadow-2xl relative my-auto border-t-8 border-emerald-500 overflow-hidden animate-fade-in">
                                
                                <button onClick={() => setShowModal(false)} className="absolute top-6 right-6 p-2 bg-slate-100 rounded-full z-10 no-print hover:bg-red-100 transition-colors"><LucideIcon name="x" className="w-6 h-6 text-slate-600" /></button>
                                
                                {isAnalyzing ? (
                                    <div className="p-20 text-center flex flex-col items-center">
                                        <div className="w-20 h-20 border-8 border-slate-100 border-t-emerald-500 rounded-full animate-spin mb-6"></div>
                                        <h2 className="text-3xl font-black text-slate-800">جاري مطابقة المعايير الطبية...</h2>
                                        <p className="mt-2 text-slate-500 font-almarai">يتم تحليل أثر المكونات على الأعضاء الحيوية</p>
                                    </div>
                                ) : (
                                    <div className="flex flex-col h-full max-h-[90vh]">
                                        {/* Header / Score */}
                                        <div className="bg-slate-900 text-white p-8 md:p-12 text-center relative overflow-hidden shrink-0">
                                            <div className="absolute top-0 right-0 w-64 h-64 bg-emerald-500/20 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
                                            <h2 className="text-2xl font-bold font-almarai text-emerald-400 mb-2">إنفوجرافيك هضيم الطبي</h2>
                                            <h1 className="text-4xl md:text-5xl font-black mb-8">أثر التغذية بعد {report.duration}</h1>
                                            
                                            <div className="flex flex-col md:flex-row items-center justify-center gap-8">
                                                <div className="relative">
                                                    <svg className="w-40 h-40 transform -rotate-90">
                                                        <circle cx="80" cy="80" r="70" stroke="currentColor" strokeWidth="12" fill="transparent" className="text-slate-800" />
                                                        <circle cx="80" cy="80" r="70" stroke="currentColor" strokeWidth="12" fill="transparent" strokeDasharray="440" strokeDashoffset={440 - (440 * report.score) / 100} className={report.score >= 70 ? 'text-emerald-500' : report.score >= 40 ? 'text-amber-500' : 'text-rose-500'} style={{ transition: 'stroke-dashoffset 1s ease-out' }} />
                                                    </svg>
                                                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                                                        <span className="text-4xl font-black">{report.score}%</span>
                                                        <span className="text-xs font-almarai text-slate-400">مؤشر الصحة</span>
                                                    </div>
                                                </div>
                                                <div className="max-w-md text-right">
                                                    <p className="text-xl md:text-2xl font-almarai leading-relaxed text-slate-200 bg-white/10 p-5 rounded-3xl backdrop-blur-sm border border-white/10">
                                                        {report.summary}
                                                    </p>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Body Chart Grid */}
                                        <div className="p-6 md:p-10 overflow-y-auto bg-slate-50">
                                            <div className="flex items-center justify-between mb-8">
                                                <h3 className="text-2xl font-black text-slate-800 flex items-center gap-3">
                                                    <LucideIcon name="stethoscope" className="w-8 h-8 text-slate-400" /> الأثر الفسيولوجي المباشر
                                                </h3>
                                                <button onClick={() => window.print()} className="no-print text-emerald-600 bg-emerald-100 px-4 py-2 rounded-xl font-bold flex items-center gap-2 hover:bg-emerald-200 transition-colors">
                                                    <LucideIcon name="printer" className="w-5 h-5" /> طباعة
                                                </button>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                                                <OrganCard title="صحة الدماغ" icon="brain" data={report.organs.brain} />
                                                <OrganCard title="القلب والأوعية" icon="heart-pulse" data={report.organs.heart} />
                                                <OrganCard title="الجهاز الهضمي" icon="activity" data={report.organs.stomach} />
                                                <OrganCard title="كثافة العظام" icon="bone" data={report.organs.bones} />
                                            </div>
                                            
                                            <div className="mt-10 text-center border-t-2 border-slate-200 pt-6 no-print">
                                                <p className="text-slate-400 font-almarai text-sm flex items-center justify-center gap-2">
                                                    <LucideIcon name="info" className="w-4 h-4" /> هذا التقرير توافقي مبني على إرشادات الطبق الصحي لوزارة الصحة.
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
