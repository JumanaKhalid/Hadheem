<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق هضيم - غذاؤك دواؤك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@700;800&family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .font-almarai { font-family: 'Almarai', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        @media print { .no-print { display: none !important; } .print-p-0 { padding: 0 !important; } }
        video { transform: scaleX(-1); } 
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CheeseIcon = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M15.2 3.8L5.6 9.3c-1.3.8-1.5 2.5-.5 3.5l8.7 8.7c.9 1 2.7.9 3.5-.5l5.5-9.6c.7-1.3-.2-3-1.6-3h-4.8L15.2 3.8z" />
                <circle cx="15.5" cy="11.5" r="1.5" /><circle cx="11.5" cy="15.5" r="1.5" />
            </svg>
        );

        const FastFoodIcon = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 11h18M3 15h18M5 11v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8M8 7l4-4 4 4" />
            </svg>
        );

        const LucideIcon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const FOOD_ITEMS = [
            { id: 1, name: 'تفاح', icon: 'apple', type: 'healthy', color: 'text-red-500', bg: 'bg-red-50' },
            { id: 2, name: 'توت', icon: 'cherry', type: 'healthy', color: 'text-purple-500', bg: 'bg-purple-50' },
            { id: 3, name: 'خضروات', icon: 'salad', type: 'healthy', color: 'text-emerald-600', bg: 'bg-emerald-50' },
            { id: 4, name: 'حليب', icon: 'milk', type: 'healthy', color: 'text-blue-500', bg: 'bg-blue-50' },
            { id: 5, name: 'ماء', icon: 'droplets', type: 'healthy', color: 'text-cyan-500', bg: 'bg-cyan-50' },
            { id: 6, name: 'أجبان', icon: 'cheese', type: 'neutral', color: 'text-amber-600', bg: 'bg-amber-50' },
            { id: 7, name: 'مكسرات', icon: 'coffee', type: 'healthy', color: 'text-orange-800', bg: 'bg-orange-50' },
            { id: 8, name: 'شوكلاتة', icon: 'candy', type: 'unhealthy', color: 'text-pink-600', bg: 'bg-pink-50' },
            { id: 9, name: 'وجبات سريعة', icon: 'fast-food', type: 'unhealthy', color: 'text-orange-600', bg: 'bg-orange-50' },
            { id: 10, name: 'مقليات', icon: 'pizza', type: 'unhealthy', color: 'text-red-600', bg: 'bg-red-50' },
            { id: 11, name: 'مشروبات غازية', icon: 'droplets', type: 'unhealthy', color: 'text-slate-700', bg: 'bg-slate-100' },
        ];

        function App() {
            const [screen, setScreen] = useState('home');
            const [basket, setBasket] = useState([]);
            const [timePeriod, setTimePeriod] = useState(1);
            const [showResult, setShowResult] = useState(false);
            const [aiResponse, setAiResponse] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [showAiModal, setShowAiModal] = useState(false);
            const videoRef = useRef(null);

            useEffect(() => {
                if (screen === 'ar') {
                    navigator.mediaDevices.getUserMedia({ video: true })
                        .then(stream => { if (videoRef.current) videoRef.current.srcObject = stream; })
                        .catch(err => console.error("Camera error:", err));
                }
            }, [screen]);

            const toggleFood = (food) => {
                setShowResult(false);
                setBasket(prev => prev.find(i => i.id === food.id) ? prev.filter(i => i.id !== food.id) : [...prev, food]);
            };

            const getFilterStyle = () => {
                if (!showResult || basket.length === 0) return {};
                let h = basket.filter(f => f.type === 'healthy').length;
                let u = basket.filter(f => f.type === 'unhealthy').length;
                const intensity = timePeriod * 0.3;
                if (u > h) return { filter: `saturate(${Math.max(0.2, 1 - (0.4 * intensity))}) sepia(${0.3 * intensity}) brightness(${0.95 - (0.05 * intensity)})` };
                if (h > u) return { filter: `saturate(${1 + (0.5 * intensity)}) brightness(1.05) contrast(1.1)` };
                return {};
            };

            const analyzeWithAI = async () => {
                setShowAiModal(true);
                setIsAnalyzing(true);
                setAiResponse(null); 
                
                // 1. محاكاة وقت التفكير (تأخير ثانيتين ليبدو كتحليل حقيقي)
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                // 2. خوارزمية ذكية مدمجة لتحليل السلة (تعمل محلياً بدون أي مفاتيح!)
                let healthyCount = basket.filter(item => item.type === 'healthy').length;
                let unhealthyCount = basket.filter(item => item.type === 'unhealthy').length;
                let total = basket.length;

                // حساب النسبة الصحية من 0 إلى 100
                let score = Math.round((healthyCount / total) * 100);
                if (unhealthyCount > healthyCount) score = Math.max(10, score - 20); // عقوبة إذا كان الأكل السيء أكثر

                let summary, positives = [], negatives = [], bodyImpact;
                const durationText = timePeriod === 1 ? 'شهر' : timePeriod + ' أشهر';

                // توليد التقرير بناءً على النسبة
                if (score >= 70) {
                    summary = "نمط غذائي ممتاز وصحي جداً، استمر على هذا المنوال.";
                    positives = ["تنوع ممتاز في العناصر الغذائية.", "اختياراتك تدعم صحة القلب والجهاز الهضمي."];
                    negatives = ["تأكد فقط من شرب كميات كافية من الماء يومياً."];
                    bodyImpact = `بعد ${durationText} من هذا النظام، ستلاحظ نشاطاً عالياً، تحسناً في جودة النوم، ومناعة قوية ضد الأمراض بفضل الفيتامينات والمعادن.`;
                } else if (score >= 40) {
                    summary = "نمط غذائي معتدل، يحتوي على توازن مقبول ولكنه يحتاج لبعض التحسينات الحقيقية.";
                    positives = ["قمت بإدراج بعض العناصر الصحية المهمة في نظامك."];
                    negatives = ["نسبة الأطعمة غير الصحية مرتفعة وتقلل من فائدة الأكل الصحي.", "قد يؤدي هذا النمط لاضطراب في مستويات الطاقة."];
                    bodyImpact = `الاستمرار لمدة ${durationText} قد يجعلك تشعر ببعض الإرهاق المتقطع أو اضطرابات هضمية بسيطة. ننصح بزيادة الخضروات وتقليل السكريات والدهون تدريجياً.`;
                } else {
                    summary = "تحذير: نمط غذائي غير صحي ويشكل خطراً كبيراً على وظائف الجسم على المدى الطويل.";
                    positives = ["الوعي بالمشكلة هو أول خطوة، ابدأ بتبديل وجبة ضارة واحدة بأخرى صحية."];
                    negatives = ["استهلاك عالي جداً للسكريات والدهون المشبعة.", "افتقار شديد للألياف والفيتامينات الأساسية."];
                    bodyImpact = `الاستمرار لمدة ${durationText} على هذا النمط يرهق الكبد والبنكرياس، ويزيد بشكل كبير من خطر الإصابة بالسمنة، الخمول المستمر، وضعف التركيز والمناعة.`;
                }

                // تعيين النتيجة وعرضها
                setAiResponse({
                    summary,
                    positives,
                    negatives,
                    bodyImpact,
                    healthScore: score
                });
                
                setIsAnalyzing(false);
            };

            if (screen === 'home') {
                return (
                    <div className="min-h-screen bg-emerald-50 flex flex-col items-center justify-center p-6 text-center">
                        <div className="bg-white p-12 rounded-[4rem] shadow-2xl max-w-lg w-full border-b-[16px] border-emerald-500">
                            <div className="bg-emerald-500 w-32 h-32 rounded-full flex items-center justify-center mx-auto mb-10 text-white shadow-xl">
                                <LucideIcon name="heart" className="w-16 h-16 animate-pulse" />
                            </div>
                            <h1 className="text-8xl font-black text-slate-800 mb-4 tracking-tighter">هضيم</h1>
                            <p className="text-3xl text-emerald-600 font-bold mb-14 leading-relaxed font-almarai">غذاؤك إما داؤك وإما دواؤك</p>
                            <button onClick={() => setScreen('ar')} className="w-full bg-slate-900 hover:bg-emerald-600 text-white font-black py-7 px-10 rounded-[2.5rem] flex items-center justify-center gap-4 transition-all text-3xl shadow-2xl">
                                ابدأ التجربة <LucideIcon name="arrow-right" className="w-10 h-10" />
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col lg:flex-row">
                    <div className="flex-1 relative bg-black h-[45vh] lg:h-screen overflow-hidden">
                        <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover transition-all duration-1000" style={getFilterStyle()} />
                        <div className="absolute top-8 left-8 right-8 flex justify-between items-start no-print">
                            <div className="bg-white/15 backdrop-blur-3xl text-white px-8 py-5 rounded-full border border-white/20">
                                <h2 className="font-black text-2xl flex items-center gap-4"><LucideIcon name="activity" className="w-8 h-8 text-emerald-400" /> عدسة هضيم</h2>
                            </div>
                            <button onClick={() => setScreen('home')} className="bg-white/20 hover:bg-red-500 p-5 rounded-full text-white backdrop-blur-md transition-all"><LucideIcon name="x" className="w-8 h-8" /></button>
                        </div>
                        {showResult && (
                            <div className="absolute bottom-12 left-0 right-0 flex justify-center px-6 no-print">
                                <button onClick={analyzeWithAI} className="w-full max-w-md bg-emerald-500 hover:bg-emerald-600 text-white font-black py-7 px-12 rounded-[3rem] shadow-2xl flex items-center justify-center gap-5 transition-all">
                                    <LucideIcon name="brain" className="w-10 h-10" /> <span className="text-3xl">تحليل هضيم AI</span>
                                </button>
                            </div>
                        )}
                    </div>

                    <div className="w-full lg:w-[600px] flex flex-col h-[55vh] lg:h-screen bg-white shadow-2xl z-30 no-print">
                        <div className="p-10 bg-emerald-600 text-white rounded-bl-[4rem]">
                            <h2 className="text-4xl font-black flex items-center gap-4"><LucideIcon name="utensils" className="w-10 h-10" /> سلة الغذاء</h2>
                        </div>
                        <div className="flex-1 overflow-y-auto p-10 space-y-12 custom-scrollbar">
                            <section>
                                <h3 className="text-2xl font-black text-slate-800 mb-6 flex items-center gap-3">مدة الاستمرار؟</h3>
                                <div className="grid grid-cols-3 gap-4">
                                    {[1, 2, 3].map(m => (
                                        <button key={m} onClick={() => { setTimePeriod(m); setShowResult(false); }} className={`py-5 rounded-[2rem] font-black text-xl border-4 transition-all ${timePeriod === m ? 'bg-emerald-500 border-emerald-500 text-white' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>
                                            {m === 1 ? 'شهر' : m + ' أشهر'}
                                        </button>
                                    ))}
                                </div>
                            </section>
                            <section>
                                <h3 className="text-2xl font-black text-slate-800 mb-6">محتويات السلة</h3>
                                <div className="grid grid-cols-3 gap-4">
                                    {FOOD_ITEMS.map(food => {
                                        const isSelected = basket.find(item => item.id === food.id);
                                        return (
                                            <button key={food.id} onClick={() => toggleFood(food)} className={`flex flex-col items-center p-5 rounded-[2.5rem] border-4 transition-all ${isSelected ? 'border-emerald-500 bg-emerald-50' : 'border-slate-50 bg-slate-50'}`}>
                                                <div className={`p-4 rounded-[1.5rem] mb-3 ${isSelected ? 'bg-white' : food.bg}`}>
                                                    {food.icon === 'cheese' ? <CheeseIcon className={`w-8 h-8 ${food.color}`} /> : 
                                                     food.icon === 'fast-food' ? <FastFoodIcon className={`w-8 h-8 ${food.color}`} /> :
                                                     <LucideIcon name={food.icon} className={`w-8 h-8 ${food.color}`} />}
                                                </div>
                                                <span className="text-base font-black text-slate-700 font-almarai">{food.name}</span>
                                            </button>
                                        );
                                    })}
                                </div>
                            </section>
                        </div>
                        <div className="p-10 border-t bg-slate-50/50">
                            <button onClick={() => setShowResult(true)} disabled={basket.length === 0} className={`w-full py-6 rounded-[2.5rem] font-black text-2xl flex items-center justify-center gap-4 ${basket.length > 0 ? 'bg-slate-900 text-white' : 'bg-slate-200 text-slate-400'}`}>
                                تطبيق الفلتر <LucideIcon name="sparkles" className="w-8 h-8" />
                            </button>
                        </div>
                    </div>

                    {showAiModal && (
                        <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-xl z-[100] flex justify-center items-center p-4 md:p-6 overflow-y-auto">
                            <div className="bg-white rounded-[3rem] md:rounded-[4rem] w-full max-w-5xl shadow-2xl relative my-auto border-t-[16px] border-emerald-500 p-8 md:p-12 animate-fade-in">
                                <button onClick={() => setShowAiModal(false)} className="absolute top-8 right-8 p-3 bg-slate-100 rounded-2xl no-print hover:bg-red-100 transition-colors"><LucideIcon name="x" className="w-8 h-8 text-slate-600" /></button>
                                
                                {isAnalyzing ? (
                                    <div className="flex flex-col items-center py-24 md:py-32 text-center">
                                        <div className="w-24 h-24 border-8 border-emerald-500 border-t-transparent rounded-full animate-spin mb-10"></div>
                                        <h2 className="text-4xl font-black text-slate-800">جاري التحليل الذكي للسلة...</h2>
                                    </div>
                                ) : (
                                    <div className="space-y-12">
                                        <div className="flex flex-col md:flex-row items-center gap-10 border-b pb-12">
                                            <div className="w-48 h-48 rounded-full border-[12px] border-emerald-500 flex items-center justify-center bg-white shadow-inner">
                                                <span className="text-6xl font-black text-emerald-600">%{aiResponse?.healthScore ?? 0}</span>
                                            </div>
                                            <div className="flex-1 text-center md:text-right">
                                                <h1 className="text-5xl font-black text-slate-900 mb-4">تقرير هضيم الذكي</h1>
                                                <p className="text-2xl text-slate-600 font-almarai leading-relaxed">
                                                    {aiResponse?.summary}
                                                </p>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <div className="bg-emerald-50 p-10 rounded-[3rem] border-2 border-emerald-100">
                                                <h3 className="text-3xl font-black text-emerald-800 mb-6 flex items-center gap-3">
                                                    <LucideIcon name="check-circle" className="w-8 h-8 text-emerald-500" /> إيجابيات النمط
                                                </h3>
                                                <ul className="space-y-4">
                                                    {aiResponse?.positives?.map((p, i) => (
                                                        <li key={i} className="text-xl font-bold font-almarai text-emerald-700 bg-white/50 p-3 rounded-xl border border-emerald-100 flex items-start gap-3">
                                                            <span className="mt-1">✅</span> {p}
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                            <div className="bg-rose-50 p-10 rounded-[3rem] border-2 border-rose-100">
                                                <h3 className="text-3xl font-black text-rose-800 mb-6 flex items-center gap-3">
                                                    <LucideIcon name="alert-triangle" className="w-8 h-8 text-rose-500" /> مخاطر محتملة
                                                </h3>
                                                <ul className="space-y-4">
                                                    {aiResponse?.negatives?.map((n, i) => (
                                                        <li key={i} className="text-xl font-bold font-almarai text-rose-700 bg-white/50 p-3 rounded-xl border border-rose-100 flex items-start gap-3">
                                                            <span className="mt-1">⚠️</span> {n}
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        </div>

                                        <div className="bg-slate-900 p-12 rounded-[3.5rem] text-white shadow-2xl relative overflow-hidden">
                                            <h3 className="text-3xl font-black mb-6 flex items-center gap-4">
                                                <LucideIcon name="info" className="w-10 h-10 text-emerald-400" /> أثر النمط على الجسم (بعد {timePeriod} أشهر)
                                            </h3>
                                            <p className="text-2xl font-bold font-almarai leading-loose text-slate-300">
                                                {aiResponse?.bodyImpact}
                                            </p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
